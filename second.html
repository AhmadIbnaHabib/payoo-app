<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payoo | AhmadIH</title>
    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <div class="min-h-screen flex justify-center items-center bg-gray-900">
        <div class="mockup-phone">
            <div class="mockup-phone-camera"></div>

            <div class="mockup-phone-display p-4 bg-[#F4F5F7]">
                <div class="flex justify-between">
                    <h1 class="text-black text-[18px] font-medium mt-1 ml-1">9:99</h1>
                    <div class="flex gap-2 text-[16px] mr-3 mt-2">
                        <i class="fa-solid fa-signal text-black"></i>
                        <i class="fa-solid fa-wifi text-black"></i>
                        <i class="fa-solid fa-battery-full text-black"></i>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mt-3 pb-3 border-b-3 border-gray-300">
                        <div class="flex">
                            <img class="h-13" src="./assets/Group.png" alt="">
                            <div>
                                <h1 class="text-[20px] font-extrabold">$<span id="available-balance">45000</span></h1>
                                <p class="text-[16px] font-semibold text-gray-500">Available Balance</p>
                            </div>
                        </div>
                        <button class="btn text-[18px] text-gray-500 rounded-xl"><i
                                class="fa-solid fa-arrow-right-from-bracket rotate-180 text-gray-600"></i> Log
                            Out</button>
                    </div>
                    <h1 class="text-[20px] font-extrabold mt-5">🔥 Welcome to Payooo!</h1>
                    <p class="font-medium text-gray-500 mt-3">Enjoy easy and convenient financial services with us.
                        Cashout charge is low and </p>
                    <div class="grid grid-cols-3 mt-5 gap-3 justify-items">
                        <div class="border border-gray-300 rounded-[10px] p-5 pt-3">
                            <div class="flex justify-center">
                                <img class="pb-1" src="./assets/wallet1.png" alt="">
                            </div>
                            <h1 class="text-center font-medium text-gray-600">Add Money</h1>
                        </div>
                        <div class="border border-gray-300 rounded-[10px] p-5 pt-3">
                            <div class="flex justify-center">
                                <img class="pb-1" src="./assets/send1.png" alt="">
                            </div>
                            <h1 class="text-center font-medium text-gray-600">Cashout</h1>
                        </div>
                        <div class="border border-gray-300 rounded-[10px] p-5 pt-3">
                            <div class="flex justify-center">
                                <img class="pb-1" src="./assets/money1.png" alt="">
                            </div>
                            <h1 class="text-center font-medium text-gray-600">Transfer</h1>
                        </div>
                        <div class="border border-gray-300 rounded-[10px] p-5 pt-3">
                            <div class="flex justify-center">
                                <img class="pb-1 mt-1" src="./assets/bonus1.png" alt="">
                            </div>
                            <h1 class="text-center font-medium text-gray-600">Get Bonus</h1>
                        </div>
                        <div class="border border-gray-300 rounded-[10px] p-5 pt-3">
                            <div class="flex justify-center">
                                <img class="pb-1" src="./assets/purse1.png" alt="">
                            </div>
                            <h1 class="text-center font-medium text-gray-600">Pay Bill</h1>
                        </div>
                        <div class="border border-gray-300 rounded-[10px] p-5 pt-3">
                            <div class="flex justify-center">
                                <img class="pb-1" src="./assets/transaction1.png" alt="">
                            </div>
                            <h1 class="text-center font-medium text-gray-600">Transactions</h1>
                        </div>
                    </div>
                </div>
                <h1 class="text-[18px] font-semibold my-5">
                    Add Money
                </h1>
                <form>
                    <div class="w-full bg-white p-5 rounded-3xl">
                        <label class="text-[18px] font-semibold" for="">Select A Bank</label>
                        <select class="select select-ghost w-full bg-[#F4F5F7] rounded-3xl mt-2 mb-2 text-[16px]  text-gray-500">
                            <option disabled selected>Select Bank</option>
                            <option>A Bank</option>
                            <option>I Bank</option>
                            <option>H Bank</option>
                        </select>
                        <br>
                        <label class="text-[18px] font-semibold" for="">Bank Account Number</label>
                        <br>
                        <input id="bank-account" type="text" placeholder="Enter 11 digit account number"
                            class="input input-ghost bg-[#F4F5F7] mt-2 mb-2 rounded-3xl text-[15px] w-full"/>
                        <br>
                        <label class="text-[18px] font-semibold" for="">Amount to Add</label>
                        <br>
                        <input id="add-amount" type="text" placeholder="Add Amount to withdraw"
                            class="input input-ghost bg-[#F4F5F7] mt-2 mb-2 rounded-3xl text-[15px] w-full" />
                        <br>
                        <label class="text-[18px] font-semibold" for="">Pin Number</label>
                        <br>
                        <input id="pin-number" type="text" placeholder="Enter 4 digit pin number"
                            class="input input-ghost bg-[#F4F5F7] mt-2 mb-5 rounded-3xl text-[15px] w-full" />
                        <button id="add-money"
                            class="btn btn-wide max-w-full rounded-3xl border-none text-[18px] text-white bg-[#0874F2]">Add Money</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="./script/home.js"></script>
</body>

</html>
